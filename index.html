<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
ARCHITIES 2026 Scanner
</title>



<!-- QR SCANNER -->

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>



<link rel="stylesheet" href="style.css">


</head>


<body>



<div class="container">



<header>

<img
src="assets/logo.PNG"
alt="ARCHITIES Logo"
class="logo">

<h1>
ARCHITIES 2026
</h1>


<p>
CHECK-IN SCANNER
</p>


</header>






<!-- ======================
LOGIN PANITIA
====================== -->


<div id="loginBox">


<h2>
🔐 PIN PANITIA
</h2>



<input

id="pin"

type="password"

placeholder="Masukkan PIN"

autocomplete="off"

>



<button onclick="login()">

MASUK

</button>



</div>









<!-- ======================
SCANNER
====================== -->


<div id="scannerBox"
style="display:none;">





<div class="scanner-frame">

    <div id="reader"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="scan-line"></div>

</div>






<div id="status"
class="waiting">

Menunggu Scan...

</div>







<div class="info scanner-info">





<div>


<h3>
Hadir
</h3>


<span id="scannerHadir">

0

</span>


</div>






<div>


<h3>
Total
</h3>


<span id="scannerTotal">

0

</span>


</div>







<div class="last-scan">


<h3>
Scan Terakhir
</h3>


<span id="scannerLast">

-

</span>


</div>





</div>







<div class="progress">


<div id="scannerProgressBar"></div>


</div>





<p id="scannerPersen">

0%

</p>







<button
onclick="aktifkanFlash()"
id="flash"
>

🔦 Flash OFF

</button>







</div>





</div>



<footer>

    <p>
        © 2026 ARCHITIES • Architecture Student Association
    </p>

</footer>


<script src="app.js"></script>



</body>


</html>
